tables:
    - name: external-task
      columns:
        - name: id
          type: id
          hide_order: 2
          align: left
        - name: topicName
          hide_order: 4
          align: left
        - name: workerId
          type: id
          hide_order: 3
          align: left
        - name: lockExpirationTime
          type: datetime
          hide_order: 2
          align: left
      drilldown:
        - target: history-external-task-log
          label: History
          param: externalTaskId
          column: id
      actions:
        - key: u
          label: Unlock
          method: POST
          path: /external-task/{id}/unlock
        - key: r
          label: Set Retries
          method: PUT
          path: /external-task/{id}/retries
          body: '{"retries":3}'
        - key: x
          label: Extend Lock
          method: POST
          path: /external-task/{id}/extendLock
          body: '{"newDuration":600000}'
    - name: job
      columns:
        - name: id
          type: id
          hide_order: 2
          align: left
        - name: jobDefinitionId
          visible: false
        - name: dueDate
          visible: false
        - name: processInstanceId
          visible: false
        - name: processDefinitionKey
          hide_order: 4
          align: left
        - name: executionId
          visible: false
        - name: retries
          type: int
          hide_order: 6
          align: center
        - name: exceptionMessage
          hide_order: 5
          align: left
        - name: failedActivityId
          type: id
          hide_order: 3
          align: left
        - name: suspended
          visible: false
        - name: priority
          visible: false
        - name: tenantId
          visible: false
        - name: createTime
          visible: false
        - name: batchId
          visible: false
      drilldown:
        - target: history-job-log
          label: History
          param: jobId
          column: id
      actions:
        - key: r
          label: Retry (retries=1)
          method: PUT
          path: /job/{id}/retries
          body: '{"retries":1}'
        - key: x
          label: Execute Job
          method: POST
          path: /job/{id}/execute
        - key: s
          label: Suspend Job
          method: PUT
          path: /job/{id}/suspended
          body: '{"suspended":true}'
        - key: a
          label: Activate Job
          method: PUT
          path: /job/{id}/suspended
          body: '{"suspended":false}'
        - key: ctrl+d
          label: Delete Job
          method: DELETE
          path: /job/{id}
          confirm: true
    - name: job-definition
      columns:
        - name: id
          type: id
          hide_order: 2
          align: left
        - name: processInstanceId
          visible: false
        - name: processDefinitionKey
          hide_order: 4
          align: left
        - name: activityId
          type: id
          hide_order: 3
          align: left
        - name: jobType
          hide_order: 3
          align: left
        - name: jobConfiguration
          visible: false
        - name: suspended
          type: bool
          hide_order: 3
          align: center
        - name: overridingJobPriority
          visible: false
        - name: tenantId
          visible: false
        - name: deploymentId
          visible: false
      drilldown:
        - target: job
          label: Jobs
          param: jobDefinitionId
          column: id
      actions:
        - key: s
          label: Suspend Job Definition
          method: PUT
          path: /job-definition/{id}/suspended
          body: '{"suspended":true}'
        - key: a
          label: Activate Job Definition
          method: PUT
          path: /job-definition/{id}/suspended
          body: '{"suspended":false}'
        - key: r
          label: Set Retries
          method: PUT
          path: /job-definition/{id}/retries
          body: '{"retries":3}'
    - name: process-definition
      search_param: nameLike
      columns:
        - name: key
          hide_order: 5
          align: left
        - name: name
          hide_order: 5
          align: left
        - name: version
          type: int
          hide_order: 3
          align: center
        - name: resource
          hide_order: 2
          align: left
      drilldown:
        - target: process-instance
          param: processDefinitionId
          column: id
          label: Instances
          title_attribute: key
        - target: history-process-instance
          param: processDefinitionId
          column: id
          label: History
          title_attribute: key
      actions:
        - key: s
          label: Suspend Definition
          method: PUT
          path: /process-definition/key/{id}/suspended
          body: '{"suspended":true,"includeProcessInstances":false}'
          id_column: key
        - key: a
          label: Activate Definition
          method: PUT
          path: /process-definition/key/{id}/suspended
          body: '{"suspended":false,"includeProcessInstances":false}'
          id_column: key
        - key: ctrl+d
          label: Delete Definition
          method: DELETE
          path: /process-definition/key/{id}
          id_column: key
          confirm: true
    - name: process-instance
      search_param: businessKeyLike
      columns:
        - name: id
          type: id
          hide_order: 5
          align: left
        - name: definitionId
          type: id
          hide_order: 2
          align: left
        - name: businessKey
          hide_order: 4
          align: left
        - name: startTime
          type: datetime
          hide_order: 3
          align: left
      drilldown:
        - target: process-variables
          param: processInstanceId
          column: id
          label: Variables
        - target: task
          param: processInstanceId
          column: id
          label: Tasks
        - target: incident
          param: processInstanceId
          column: id
          label: Incidents
        - target: variable-instance
          param: processInstanceId
          column: id
          label: Var Instances
      actions:
        - key: s
          label: Suspend Instance
          method: PUT
          path: /process-instance/{id}/suspended
          body: '{"suspended":true}'
        - key: r
          label: Resume Instance
          method: PUT
          path: /process-instance/{id}/suspended
          body: '{"suspended":false}'
        - key: ctrl+d
          label: Delete Instance
          method: DELETE
          path: /process-instance/{id}
          confirm: true
    - name: process-variables
      api_path: /process-instance/{parentId}/variables
      count_path: ""
      edit_action:
        method: PUT
        path: /process-instance/{parentId}/variables/{name}
        body_template: '{"value": {value}, "type": "{type}"}'
        name_column: name
      columns:
        - name: name
          align: left
        - name: value
          align: left
          editable: true
          input_type: auto
    - name: task
      search_param: nameLike
      columns:
        - name: id
          type: id
          hide_order: 3
          align: left
        - name: name
          hide_order: 5
          align: left
        - name: assignee
          hide_order: 4
          align: left
      drilldown:
        - target: variable-instance
          label: Var Instances
          param: taskIdIn
          column: id
        - target: history-detail
          label: Detail
          param: taskId
          column: id
      actions:
        - key: c
          label: Claim Task
          method: POST
          path: /task/{id}/claim
          body: '{"userId": "{currentUser}"}'
        - key: u
          label: Unclaim Task
          method: POST
          path: /task/{id}/unclaim
        - key: d
          label: Delegate Task
          method: POST
          path: /task/{id}/delegate
          body: '{"userId": "{currentUser}"}'
        - key: ctrl+d
          label: Delete Task
          method: DELETE
          path: /task/{id}
          confirm: true
    - name: authorization
      columns:
        - name: id
          type: id
          align: left
        - name: userId
          type: id
          align: left
        - name: groupId
          type: id
          align: left
        - name: resourceId
          type: id
          align: left
      actions:
        - key: ctrl+d
          label: Delete Authorization
          method: DELETE
          path: /authorization/{id}
          confirm: true
    - name: batch
      columns:
        - name: id
          type: id
          align: left
        - name: type
          align: left
        - name: totalJobs
          type: int
          align: center
        - name: tenantId
          type: id
          align: left
      drilldown:
        - target: history-batch
          label: History
          param: batchId
          column: id
      actions:
        - key: s
          label: Suspend Batch
          method: PUT
          path: /batch/{id}/suspended
          body: '{"suspended":true}'
        - key: a
          label: Activate Batch
          method: PUT
          path: /batch/{id}/suspended
          body: '{"suspended":false}'
        - key: ctrl+d
          label: Delete Batch
          method: DELETE
          path: /batch/{id}
          confirm: true
    - name: batch-statistics
      columns:
        - name: id
          type: id
          align: left
        - name: type
          align: left
        - name: remainingJobs
          type: int
          align: center
        - name: failedJobs
          type: int
          align: center
    - name: decision-definition
      columns:
        - name: key
          align: left
        - name: name
          align: left
        - name: version
          type: int
          align: center
        - name: resource
          align: left
      drilldown:
        - target: history-decision-instance
          label: History
          param: decisionDefinitionKey
          column: key
      actions:
        - key: ctrl+d
          label: Delete Definition
          method: DELETE
          path: /decision-definition/key/{id}
          id_column: key
          confirm: true
    - name: decision-requirements-definition
      columns:
        - name: key
          align: left
        - name: name
          align: left
        - name: version
          type: int
          align: center
        - name: resource
          align: left
    - name: deployment
      search_param: nameLike
      columns:
        - name: id
          type: id
          align: left
        - name: name
          align: left
        - name: deploymentTime
          type: datetime
          align: left
        - name: tenantId
          type: id
          align: left
      drilldown:
        - target: process-definition
          label: Definitions
          param: deploymentId
          column: id
        - target: decision-definition
          label: Decisions
          param: deploymentId
          column: id
      actions:
        - key: ctrl+d
          label: Delete Deployment
          method: DELETE
          path: /deployment/{id}
          confirm: true
    - name: event-subscription
      columns:
        - name: id
          type: id
          align: left
        - name: eventType
          align: left
        - name: eventName
          align: left
        - name: processInstanceId
          type: id
          align: left
    - name: execution
      columns:
        - name: id
          type: id
          align: left
        - name: processInstanceId
          type: id
          align: left
        - name: ended
          type: bool
          align: center
        - name: tenantId
          type: id
          align: left
      actions:
        - key: g
          label: Signal Execution
          method: POST
          path: /execution/{id}/signal
    - name: filter
      columns:
        - name: id
          type: id
          align: left
        - name: resourceType
          align: left
        - name: name
          align: left
        - name: owner
          align: left
      actions:
        - key: ctrl+d
          label: Delete Filter
          method: DELETE
          path: /filter/{id}
          confirm: true
    - name: group
      search_param: idLike
      columns:
        - name: id
          type: id
          align: left
        - name: name
          align: left
        - name: type
          align: left
      drilldown:
        - target: history-identity-link-log
          label: Identity Links
          param: groupId
          column: id
      actions:
        - key: ctrl+d
          label: Delete Group
          method: DELETE
          path: /group/{id}
          confirm: true
    - name: history-activity-instance
      api_path: /history/activity-instance
      count_path: /history/activity-instance/count
      columns:
        - name: id
          type: id
          align: left
        - name: activityName
          align: left
        - name: activityType
          align: center
        - name: assignee
          align: left
        - name: processInstanceId
          type: id
          align: left
    - name: history-batch-cleanable-batch-report
      api_path: /history/batch/cleanable-batch-report
      count_path: /history/batch/cleanable-batch-report/count
      columns:
        - name: batchType
          align: left
        - name: historyTimeToLive
          type: int
          align: center
        - name: finishedBatchCount
          type: int
          align: center
        - name: cleanableBatchCount
          type: int
          align: center
    - name: history-batch
      api_path: /history/batch
      count_path: /history/batch/count
      columns:
        - name: id
          type: id
          align: left
        - name: type
          align: left
        - name: totalJobs
          type: int
          align: center
        - name: tenantId
          type: id
          align: left
      actions:
        - key: ctrl+d
          label: Delete Historic Batch
          method: DELETE
          path: /history/batch/{id}
          confirm: true
    - name: history-decision-definition-cleanable-decision-instance-report
      api_path: /history/decision-definition/cleanable-decision-instance-report
      count_path: /history/decision-definition/cleanable-decision-instance-report/count
      columns:
        - name: decisionDefinitionKey
          align: left
        - name: decisionDefinitionName
          align: left
        - name: finishedDecisionInstanceCount
          type: int
          align: center
        - name: cleanableDecisionInstanceCount
          type: int
          align: center
    - name: history-decision-instance
      api_path: /history/decision-instance
      count_path: /history/decision-instance/count
      columns:
        - name: id
          type: id
          align: left
        - name: decisionDefinitionKey
          align: left
        - name: evaluationTime
          type: datetime
          align: left
        - name: processInstanceId
          type: id
          align: left
    - name: history-detail
      api_path: /history/detail
      count_path: /history/detail/count
      columns:
        - name: id
          type: id
          align: left
        - name: type
          align: left
        - name: processInstanceId
          type: id
          align: left
        - name: time
          type: datetime
          align: left
    - name: history-external-task-log
      api_path: /history/external-task-log
      count_path: /history/external-task-log/count
      columns:
        - name: id
          type: id
          align: left
        - name: externalTaskId
          type: id
          align: left
        - name: topicName
          align: left
        - name: timestamp
          type: datetime
          align: left
    - name: history-identity-link-log
      api_path: /history/identity-link-log
      count_path: /history/identity-link-log/count
      columns:
        - name: time
          type: datetime
          align: left
        - name: type
          align: left
        - name: userId
          type: id
          align: left
        - name: taskId
          type: id
          align: left
    - name: history-incident
      api_path: /history/incident
      count_path: /history/incident/count
      columns:
        - name: id
          type: id
          align: left
        - name: incidentType
          align: left
        - name: activityId
          type: id
          align: left
        - name: processInstanceId
          type: id
          align: left
        - name: incidentMessage
          align: left
    - name: history-job-log
      api_path: /history/job-log
      count_path: /history/job-log/count
      columns:
        - name: id
          type: id
          align: left
        - name: timestamp
          type: datetime
          align: left
        - name: jobId
          type: id
          align: left
        - name: jobExceptionMessage
          align: left
    - name: history-process-definition-cleanable-process-instance-report
      api_path: /history/process-definition/cleanable-process-instance-report
      count_path: /history/process-definition/cleanable-process-instance-report/count
      columns:
        - name: processDefinitionKey
          align: left
        - name: processDefinitionName
          align: left
        - name: finishedProcessInstanceCount
          type: int
          align: center
        - name: cleanableProcessInstanceCount
          type: int
          align: center
    - name: history-process-instance
      api_path: /history/process-instance
      count_path: /history/process-instance/count
      columns:
        - name: id
          type: id
          hide_order: 2
          align: left
        - name: processDefinitionKey
          hide_order: 4
          align: left
        - name: businessKey
          hide_order: 3
          align: left
        - name: startTime
          type: datetime
          hide_order: 3
          align: left
      actions:
        - key: ctrl+d
          label: Delete Historic Instance
          method: DELETE
          path: /history/process-instance/{id}
          confirm: true
    - name: history-task
      api_path: /history/task
      count_path: /history/task/count
      columns:
        - name: id
          type: id
          align: left
        - name: name
          align: left
        - name: assignee
          align: left
        - name: startTime
          type: datetime
          align: left
    - name: history-user-operation
      api_path: /history/user-operation
      count_path: /history/user-operation/count
      columns:
        - name: timestamp
          type: datetime
          align: left
        - name: userId
          type: id
          align: left
        - name: operationType
          align: left
        - name: entityType
          align: left
    - name: history-variable-instance
      api_path: /history/variable-instance
      count_path: /history/variable-instance/count
      columns:
        - name: name
          align: left
        - name: value
          align: left
        - name: processInstanceId
          type: id
          align: left
    - name: incident
      search_param: incidentMessage
      columns:
        - name: id
          type: id
          hide_order: 2
          align: left
        - name: incidentType
          hide_order: 4
          align: left
        - name: activityId
          type: id
          hide_order: 3
          align: left
        - name: processInstanceId
          type: id
          hide_order: 2
          align: left
        - name: incidentMessage
          hide_order: 5
          align: left
      actions:
        - key: ctrl+d
          label: Resolve Incident
          method: DELETE
          path: /incident/{id}
          confirm: true
        - key: a
          label: Set Annotation
          method: PUT
          path: /incident/{id}/annotation
          body: '{"annotation":"manual"}'
    - name: tenant
      columns:
        - name: id
          type: id
          align: left
        - name: name
          align: left
      drilldown:
        - target: process-definition
          label: Definitions
          param: tenantIdIn
          column: id
        - target: process-instance
          param: tenantIdIn
          column: id
        - target: deployment
          label: Deployment
          param: tenantIdIn
          column: id
      actions:
        - key: ctrl+d
          label: Delete Tenant
          method: DELETE
          path: /tenant/{id}
          confirm: true
    - name: user
      search_param: idLike
      columns:
        - name: id
          type: id
          align: left
        - name: firstName
          align: left
        - name: lastName
          align: left
        - name: email
          align: left
      drilldown:
        - target: history-user-operation
          label: Operations
          param: userId
          column: id
      actions:
        - key: l
          label: Unlock User
          method: POST
          path: /user/{id}/unlock
        - key: ctrl+d
          label: Delete User
          method: DELETE
          path: /user/{id}
          confirm: true
    - name: variable-instance
      edit_action:
        method: PUT
        path: /variable-instance/{id}
        body_template: '{"value": {value}, "type": "{type}"}'
        name_column: id
      columns:
        - name: name
          align: left
        - name: value
          align: left
          editable: true
          input_type: auto
        - name: processInstanceId
          type: id
          align: left
